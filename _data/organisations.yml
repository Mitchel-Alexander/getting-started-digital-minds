- name: Wellcome Centre for Human Neuroimaging / FIL (UCL)
  url: https://www.fil.ion.ucl.ac.uk/
  zone: empirical-foundations
  description: Karl Friston's home lab at UCL; the world's leading centre for computational neuroimaging. Friston's free energy
    principle — a mathematical framework proposing that all adaptive systems minimise prediction error — is increasingly applied
    to model AI consciousness and agency, providing a formal bridge between biological and artificial systems. The active
    inference framework derived from this work is now being tested in artificial agents.
