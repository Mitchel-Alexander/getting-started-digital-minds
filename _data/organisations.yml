  zone: digital-minds
  description: Directed by Anil Seth; integrates neuroscience, psychology, and computational modelling of consciousness. Seth's
    predictive processing account — which grounds consciousness in the brain's predictions about internal bodily states —
    has been directly applied to AI consciousness questions. Seth won the 2025 Berggruen essay prize for "The Mythology of
    Conscious AI," a sceptical intervention arguing against premature AI consciousness claims.
