- name: Association for Mathematical Consciousness Science (AMCS)
  url: https://amcs-community.org/
  zone: digital-minds
  description: International association of 150+ researchers advancing mathematical and computational approaches to consciousness
    science. Organises the Models of Consciousness (MoC) conference series — MoC5 (Bamberg, 2024) and MoC6 (Sapporo, 2025)
    — which provides the primary international forum for formal and mathematical approaches to consciousness with a growing
    AI orientation. Johannes Kleiner's work on the mathematical structure of consciousness theories is directly relevant to
    formalising AI consciousness assessment.
