  zone: digital-minds
  description: The University of Oxford previously hosted both the Future of Humanity Institute (FHI) and the Global Priorities
    Institute (GPI), research centres that served as catalysts for work on AI welfare. Many former researchers from these
    institutes went on to key research roles at other organisations working on AI consciousness and welfare. Following the
    closure of both FHI and GPI, research into these topics continues primarily within the Faculty of Philosophy, where scholars
