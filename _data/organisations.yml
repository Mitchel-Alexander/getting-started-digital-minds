- name: California Institute for Machine Consciousness (CIMC)
  url: https://cimc.ai/
  zone: digital-minds
  description: Nonprofit research institute launched 2025 focused on formulating testable theories of machine consciousness.
    Co-organised the Machine Consciousness workshop at AGI-25. Joscha Bach's computational account — which treats consciousness
    as a specific kind of self-modelling process — offers a distinct theoretical entry point from the neuroscience-derived
    frameworks that dominate the field. Early-stage but institutionally distinct; limited published output to date.
