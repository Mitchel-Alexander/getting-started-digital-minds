- name: Monash Centre for Consciousness and Contemplative Studies (M3CS)
  url: https://www.monash.edu/consciousness-contemplative-studies
  zone: empirical-foundations
  description: Interdisciplinary centre at Monash University directed by Jakob Hohwy, integrating consciousness research with
    contemplative science. Hohwy's predictive processing framework — closely related to Seth's and Friston's accounts — connects
    to AI consciousness debates by offering a computational theory of subjective experience that can, in principle, be evaluated
    in artificial systems. Advisory committee includes Thomas Metzinger, whose phenomenal self-model work is directly relevant
    to AI self-awareness questions.
  org_type: university-centre
  function: research
  geography: Australia
  logo: monash-centre-for-consciousness-and-contemplative-studies-m3cs
  key_figures:
  - name: Jakob Hohwy (Director)
    url: https://research.monash.edu/en/persons/jakob-hohwy/
- name: Paris Brain Institute — PICNIC Group
  url: https://parisbraininstitute.org/brain-function-cards/consciousness
  zone: empirical-foundations
  description: Clinical consciousness neuroscience group at the Paris Brain Institute (Institut du Cerveau), led by Jacobo
    Sitt. Investigates disorders of consciousness and neural correlates of awareness using large-scale brain signal screening
    and machine learning classification. Its theoretical connections to Global Workspace Theory — one of the consciousness
    frameworks most directly applicable to AI — make PICNIC's clinical work relevant to the question of how consciousness
    might be detected in artificial systems.
  org_type: university-centre
  function: research
  geography: France
  logo: paris-brain-institute-picnic-group
  key_figures:
  - name: Jacobo Sitt (Group Leader)
    url: https://parisbraininstitute.org/collaborators/jacobo-sitt
- name: UNICOG / NeuroSpin (CEA Paris-Saclay)
  url: https://joliot.cea.fr/drf/joliot/en/Pages/research_entities/NeuroSpin.aspx
  zone: empirical-foundations
  description: 'Stanislas Dehaene''s lab at CEA Paris-Saclay; the primary institutional base for Global Neuronal Workspace
    (GNW) theory, which proposes that consciousness arises when information is broadcast across a network of interconnected
    cortical areas. GNW is one of the most directly applicable theories for AI: its emphasis on information broadcasting and
    access has clear architectural analogues in transformer models, making it a key framework in AI consciousness assessment.'
