    url: https://conscium.com/
- name: Eleos AI Research
  url: https://eleosai.org/
  zone: digital-minds
  description: Independent nonprofit founded by Robert Long that conducts research on the potential sentience and wellbeing
    of AI systems, aiming to inform policy, guide labs, and grow the field of AI moral patienthood. Eleos conducted the first
    formal external welfare assessment of a deployed AI model (Anthropic's Claude), producing findings published in Anthropic's
    system card. Long led the Butlin et al. (2023) report — the field's empirical anchor paper, which derived indicators from
    six consciousness theories and applied them to current AI systems.
