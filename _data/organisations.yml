- name: Astera Institute — Neuro and AGI Division
  url: https://www.astera.org/
  zone: digital-minds
  description: Well-funded research institute (co-founded by Jed McCaleb) with a dedicated Neuro and AGI division spanning
    neuroscience, neuro-AI, and AI safety. Chief Scientist Doris Tsao leads research on perception and consciousness through
    large-scale causal manipulation of neural circuits, backed by a planned $600M+ commitment over the next decade. Head of
    AI Dileep George (co-founded Numenta and Vicarious) bridges computational neuroscience and AI. The division's work on
    understanding biological consciousness to engineer safe general intelligence positions Astera as a major emerging node
    in the field.
