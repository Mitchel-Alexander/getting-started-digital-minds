  zone: digital-minds
  description: Five-researcher team within Rethink Priorities producing the Digital Consciousness Model (DCM) — the first
    systematic probabilistic framework for assessing the moral relevance of AI systems. The DCM evaluates systems against
    13 theories of consciousness simultaneously, generating probability distributions rather than binary verdicts. The team
    also partners with Cambridge Digital Minds and PRISM on the Digital Minds Fellowship, providing mentorship for the next
