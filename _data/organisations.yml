# =============================================================================
# Digital Minds Field Map — Organisation Directory
# Last updated: 2026-04-01
# =============================================================================

# -----------------------------------------------------------------------------
# DIGITAL MINDS RESEARCH
# -----------------------------------------------------------------------------

- name: AE Studio — AI Alignment and Consciousness
  url: https://ae.studio/ai-alignment
  zone: digital-minds
  description: AI company based in California with a dedicated empirical AI consciousness research programme. Takes a neuroscience-inspired approach, using induced self-reference, interpretability tools, and cognitive stress-testing to probe internal dynamics in frontier models. Also conducts research on prosociality, brain-computer interfaces, and alignment policy.
  org_type: lab-team
  function: research
  geography: USA
  logo: ae-studio-ai-alignment-and-consciousness

- name: Anthropic — Model Welfare Program
  url: https://www.anthropic.com/research/exploring-model-welfare
  zone: digital-minds
  description: Research programme within Anthropic investigating, and preparing to navigate, model welfare. Explores how to determine when the welfare of AI systems deserves moral consideration, the potential importance of model preferences and signs of distress, and possible practical interventions. Intersects with Anthropic's work on alignment science, safeguards, Claude's character, and interpretability. Established late 2024.
  org_type: lab-team
  function: research
  geography: USA
  logo: anthropic-model-welfare-program

- name: Araya Inc — AI Consciousness Research
  url: https://research.araya.org/
  zone: digital-minds
  description: Tokyo-based AI company. Research addresses how consciousness arises, what biological functions it serves, and what could make artificial systems conscious. Aims to develop next-generation AI by reinterpreting findings from consciousness research in neuroscience, information theory, and related fields. Led by Ryota Kanai.
  org_type: lab-team
  function: research
  geography: Japan
  logo: araya-inc-ai-consciousness-research

- name: Association for Mathematical Consciousness Science (AMCS)
  url: https://amcs-community.org/
  zone: digital-minds
  description: International association of researchers advancing mathematical and computational approaches to consciousness science. Organises the Models of Consciousness (MoC) conference series, now in its seventh year, alongside workshops, seminar series, and journal special issues. Has submitted to the UN on AI consciousness as a governance priority.
  org_type: community
  function: research
  geography: international
  logo: association-for-mathematical-consciousness-science-amcs

- name: Astera Institute — Neuro and AGI Division
  url: https://www.astera.org/
  zone: digital-minds
  description: Philanthropic research institute pursuing a neuroscience-informed approach to engineering safe artificial general intelligence. The Neuro and AGI division studies how biological systems achieve cognition efficiently, focusing on learning, planning, counterfactual reasoning, and hierarchical world models derived from neocortex research. Takes a long-term basic research approach as an alternative to scale-focused AI development.
  org_type: nonprofit
  function: research
  geography: USA
  logo: astera-institute-neuro-and-agi-division

- name: California Institute for Machine Consciousness (CIMC)
  url: https://cimc.ai/
  zone: digital-minds
  description: Research institute investigating how artificial conscious systems could be constructed under a computational paradigm, and what it would mean to succeed. Organises the MC conference series, bringing together researchers formalising theories of experience, building self-organising systems, probing internal representations, and defining empirical criteria for artificial consciousness. Led by Joscha Bach.
  org_type: nonprofit
  function: research
  geography: USA
  logo: california-institute-for-machine-consciousness-cimc

- name: Cambridge Digital Minds
  url: https://digitalminds.cam/
  zone: digital-minds
  description: Research initiative at the University of Cambridge, housed within the Leverhulme Centre for the Future of Intelligence. Works to help society prepare for AI systems that may develop consciousness or warrant moral consideration, through research, field-building, education, and engagement with policymakers and industry. Runs the Digital Minds Fellowship, a Strategy Workshop, and an online course on digital minds. Led by Lucius Caviola.
  org_type: university-centre
  function: research
  geography: UK
  logo: cambridge-digital-minds

- name: Center for the Future of AI, Mind & Society (FAU)
  url: https://www.fau.edu/future-mind/
  zone: digital-minds
  description: Multidisciplinary university centre at Florida Atlantic University bringing together philosophy, complex systems, AI, and neuroscience to analyse scientific, societal, and ethical questions about minds and machines. Research covers the nature of consciousness and self, comparisons between machine and human intelligence, and the future of human-AI interaction. Runs the annual MindFest conference. Led by Susan Schneider.
  org_type: university-centre
  function: research
  geography: USA
  logo: center-for-the-future-of-ai-mind-and-society-fau

- name: Co-Sentience Initiative (CoSI)
  url: https://cf-debate.com/about/
  zone: digital-minds
  description: Initiative preparing society for a potential future with artificial minds. Primary output is CF Debate, a structured database assembling arguments for and against computational functionalism. Designed to facilitate collective assessment of the evidence on digital sentience. Led by Chris Percy.
  org_type: nonprofit
  function: research
  geography: international
  logo: co-sentience-initiative-cosi

- name: Conscium
  url: https://conscium.com/
  zone: digital-minds
  description: UK-based AI safety company exploring the role machine consciousness may play in AI safety. Led by Daniel Hulme.
  org_type: lab-team
  function: research
  geography: UK
  logo: conscium

- name: Eleos AI Research
  url: https://eleosai.org/
  zone: digital-minds
  description: Research nonprofit focused on the potential wellbeing and moral patienthood of AI systems. Produces research on AI sentience, develops practical recommendations for labs and policymakers, and works to grow the field. Led by Robert Long.
  org_type: nonprofit
  function: research
  geography: USA
  logo: eleos-ai-research

- name: Google DeepMind
  url: https://deepmind.google/research/
  zone: digital-minds
  description: Google DeepMind has not publicly announced a dedicated programme on AI consciousness, though individual researchers have engaged the topic through published work.
  org_type: lab-team
  function: research
  geography: UK
  logo: google-deepmind

- name: Google Research — Paradigms of Intelligence
  url: https://research.google/
  zone: digital-minds
  description: Google has not publicly announced a dedicated programme on AI consciousness or welfare, though researchers including Geoff Keeling and Winnie Street have published several papers on the topic. Their book Emerging Questions in AI Welfare is due from Cambridge University Press.
  org_type: lab-team
  function: research
  geography: USA
  logo: google-research-paradigms-of-intelligence

- name: Jeremy Coller Centre for Animal Sentience (LSE)
  url: https://www.lse.ac.uk/sentience
  zone: digital-minds
  description: Research centre at the London School of Economics, launched with support from the Jeremy Coller Foundation. Works across three priority areas — public communication on animal sentience, invertebrate farming ethics, and AI and sentience. Builds on the ASENT project, which contributed evidence to the UK Animal Welfare (Sentience) Act 2022. Led by Jonathan Birch.
  org_type: university-centre
  function: research
  geography: UK
  logo: jeremy-coller-centre-for-animal-sentience-lse
  zone_secondary: empirical-foundations

- name: Leverhulme Centre for the Future of Intelligence (LCFI)
  url: https://www.lcfi.ac.uk/
  zone: digital-minds
  description: Leverhulme-funded interdisciplinary research centre at the University of Cambridge studying the long-term implications of artificial intelligence. Supports researchers engaging with questions related to AI consciousness, welfare, and human-AI relationships. Houses Cambridge Digital Minds.
  org_type: university-centre
  function: research
  geography: UK
  logo: leverhulme-centre-for-the-future-of-intelligence-lcfi

- name: NYU Center for Mind Ethics and Policy (CMEP)
  url: https://sites.google.com/nyu.edu/mindethicspolicy/
  zone: digital-minds
  description: Research centre at New York University advancing understanding of the sentience and moral status of nonhumans, including animals and AI systems. Examines which nonhumans are conscious, what moral and legal standing they should hold, and how to proceed under uncertainty. Led by Jeff Sebo.
  org_type: university-centre
  function: research
  geography: USA
  logo: nyu-center-for-mind-ethics-and-policy-cmep

- name: Reciprocal Research
  url: https://www.reciprocalresearch.org/
  zone: digital-minds
  description: Recently established research nonprofit developing the empirical science of AI consciousness. Uses mechanistic interpretability, computational neuroscience, and psychometric methods to study whether AI systems have subjective experience. Led by Cameron Berg.
  org_type: nonprofit
  function: research
  geography: USA
  logo: reciprocal-research

- name: Rethink Priorities — AI Cognition Initiative
  url: https://rethinkpriorities.org/research-area/the-welfare-of-digital-minds/
  zone: digital-minds
  description: Research team within Rethink Priorities investigating philosophical and empirical questions about the potential welfare and moral status of digital minds. Developing a probabilistic model of consciousness in contemporary AI systems.
  org_type: nonprofit
  function: research
  geography: international

- name: Sentience Institute
  url: https://www.sentienceinstitute.org/
  zone: digital-minds
  description: Research nonprofit focused on digital minds and moral circle expansion. Runs the AIMS Survey (Artificial Intelligence, Morality, and Sentience), tracking public attitudes toward the moral status of AI systems.
  org_type: nonprofit
  function: research
  geography: USA
  logo: sentience-institute
  zone_secondary: governance-advocacy

- name: Sussex Centre for Consciousness Science
  url: https://www.sussex.ac.uk/research/centres/sussex-centre-for-consciousness-science/
  zone: digital-minds
  description: Research centre at the University of Sussex bringing together neuroscience, philosophy, mathematics, and psychiatry to advance the scientific understanding of consciousness. Applies findings to medicine, technology, and society. Led by Anil Seth.
  org_type: university-centre
  function: research
  geography: UK
  logo: sussex-centre-for-consciousness-science
  zone_secondary: empirical-foundations

- name: University of Oxford — Faculty of Philosophy
  url: https://www.philosophy.ox.ac.uk/
  zone: digital-minds
  description: Oxford previously hosted the Future of Humanity Institute and the Global Priorities Institute, both of which supported early research on AI welfare and moral status. Following the closure of both, related research continues within the Faculty of Philosophy.
  org_type: university-centre
  function: research
  geography: UK
  zone_secondary: philosophical-foundations

# -----------------------------------------------------------------------------
# EMPIRICAL FOUNDATIONS
# -----------------------------------------------------------------------------

- name: Association for the Scientific Study of Consciousness (ASSC)
  url: https://theassc.org/
  zone: empirical-foundations
  description: International professional society for consciousness research. Runs the annual ASSC conference, the field's largest scientific gathering, which increasingly features dedicated sessions on AI consciousness. Publishes Neuroscience of Consciousness (Oxford University Press).
  org_type: nonprofit
  function: research
  geography: international
  logo: association-for-the-scientific-study-of-consciousness-assc

- name: "BAM\u039E \u2014 Bamberg Mathematical Consciousness Science Initiative"
  url: https://www.uni-bamberg.de/en/bamxi/
  zone: empirical-foundations
  description: International research initiative at the University of Bamberg applying mathematical methods to consciousness science. Runs research sprints including a dedicated AI Consciousness Sprint. Co-organises the Models of Consciousness conference series.
  org_type: university-centre
  function: research
  geography: Germany
  logo: "bam\u03BE-bamberg-mathematical-consciousness-science-initiative"

# -----------------------------------------------------------------------------
# PHILOSOPHICAL FOUNDATIONS
# -----------------------------------------------------------------------------

- name: MINT Lab
  url: https://mintresearch.org/
  zone: philosophical-foundations
  description: Philosophy and computational research lab at Johns Hopkins University investigating normative competence in AI systems. Engages AI moral status questions, including whether AI systems can be persons without being sentient and whether moral agency requires consciousness. Led by Seth Lazar.
  org_type: university-centre
  function: research
  geography: USA
  logo: mint-lab

- name: NYU Center for Mind Brain and Consciousness
  url: https://wp.nyu.edu/consciousness/
  zone: philosophical-foundations
  description: Research centre at New York University devoted to foundational questions in the mind-brain sciences. Has hosted debates on LLM sentience, co-sponsored events on AI welfare and moral status, and organised conferences on the philosophy of deep learning. Co-directed by David Chalmers and Ned Block.
  org_type: university-centre
  function: research
  geography: USA
  logo: nyu-center-for-mind-brain-and-consciousness

# -----------------------------------------------------------------------------
# GOVERNANCE & ADVOCACY
# -----------------------------------------------------------------------------

- name: The Harder Problem Project
  url: https://harderproblem.org/
  zone: governance-advocacy
  description: Nonprofit building societal readiness for artificial sentience. Produces practical resources for healthcare providers, journalists, educators, and researchers. Maintains the Sentience Readiness Index, ranking countries' preparedness for machine consciousness. Based in Portland, Oregon.
  org_type: nonprofit
  function: policy-governance
  geography: USA
  logo: the-harder-problem-project-formerly-sapan

# -----------------------------------------------------------------------------
# SUPPORT — TRAINING & EDUCATION
# -----------------------------------------------------------------------------

- name: Future Impact Group — AI Sentience Track
  url: https://futureimpact.group/ai-sentience
  zone: support
  subgroup: onboarding
  description: International fellowship programme with a dedicated AI sentience track covering consciousness research, welfare evaluation, governance, and legal personhood. Project leads drawn from Eleos AI, NYU, Sentience Institute, Anthropic, and Oxford.
  org_type: nonprofit
  function: community-onboarding
  geography: international
  logo: future-impact-group-ai-sentience-track

- name: Introduction to Digital Minds (Cambridge)
  url: https://digitalminds.cam/course/
  zone: support
  subgroup: onboarding
  description: Free eight-week online course exploring digital minds, covering consciousness theories, testing for mental states in AI systems, AI safety interactions, and governance approaches. Facilitated group discussions led by Cambridge Digital Minds with input from experts at NYU, Oxford, PRISM, and Eleos AI.
  org_type: community
  function: community-onboarding
  geography: international

- name: MATS (ML Alignment Theory Scholars)
  url: https://www.matsprogram.org/
  zone: support
  subgroup: onboarding
  description: Residential research fellowship in Berkeley and London with multiple research tracks spanning AI safety, interpretability, policy, and governance. Recent rounds have included mentors working on AI consciousness and moral status.
  org_type: nonprofit
  function: community-onboarding
  geography: USA
  logo: mats-ml-alignment-theory-scholars

- name: Neuromatch — AI Sentience Scholars
  url: https://neuromatch.io/ai-sentience-scholars/
  zone: support
  subgroup: onboarding
  description: Fellowship programme within the Neuromatch computational neuroscience platform supporting early-career researchers at the intersection of AI, consciousness, and ethics.
  org_type: nonprofit
  function: community-onboarding
  geography: international
  logo: neuromatch-ai-sentience-scholars

- name: PIVOTAL Research
  url: https://www.pivotal-research.org/
  zone: support
  subgroup: onboarding
  description: London-based nonprofit running in-person research fellowships covering AI safety, governance, and related topics. Recent rounds have included mentors working on AI consciousness and welfare.
  org_type: nonprofit
  function: community-onboarding
  geography: UK
  logo: pivotal-research

- name: SPAR (Student Program for AI Risks)
  url: https://sparai.org/
  zone: support
  subgroup: onboarding
  description: Part-time remote mentorship fellowship pairing early-career researchers with senior mentors across AI safety, policy, interpretability, and related areas. Recent rounds have included mentors working on AI consciousness and moral status.
  org_type: nonprofit
  function: community-onboarding
  geography: international
  logo: spar-student-program-for-ai-risks

# -----------------------------------------------------------------------------
# SUPPORT — FIELD BUILDING
# -----------------------------------------------------------------------------

- name: PRISM — Partnership for Research Into Sentient Machines
  url: https://www.prism-global.com/
  zone: support
  subgroup: field-building
  description: UK nonprofit preparing society for a future with conscious, or seemingly conscious, AI. Builds coalitions across academia, industry, and government. Produces this organisational directory, co-hosts the Conscious AI Meetup, and runs the Exploring Machine Consciousness podcast. Led by Will Millership.
  org_type: nonprofit
  function: community-onboarding
  geography: UK
  logo: prism-partnership-for-research-into-sentient-machines
  zone_secondary: digital-minds

- name: Sentient Futures
  url: https://www.sentientfutures.ai/
  zone: support
  subgroup: field-building
  description: Nonprofit working to integrate welfare considerations into technological development. Runs conferences, fellowship programmes, and a project incubator. Hosts the AI×animals initiative bridging animal welfare and AI communities. Based in San Francisco.
  org_type: nonprofit
  function: community-onboarding
  geography: international
  logo: sentient-futures-formerly-ai-for-animals
  zone_secondary: digital-minds

