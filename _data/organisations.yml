    url: https://thomasmetzinger.com/
- name: Max Planck Institute for Empirical Aesthetics
  url: https://www.aesthetics.mpg.de/en.html
  zone: empirical-foundations
  description: Max Planck Institute department in Frankfurt serving as the administrative and scientific lead of the COGITATE
    consortium. Directed by Lucia Melloni, whose research spans perception, aesthetics, and the empirical testing of consciousness
    theories. The methodological template COGITATE established — structured adversarial collaboration between competing theories
    — is being adopted by the AI consciousness field as a model for how to adjudicate between rival frameworks for assessing
    AI systems.
