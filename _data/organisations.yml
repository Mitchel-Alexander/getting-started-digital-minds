- name: Jeremy Coller Centre for Animal Sentience (LSE)
  url: https://www.lse.ac.uk/sentience
  zone: digital-minds
  description: University centre launched 2025 at LSE directed by Jonathan Birch. Birch's sentience precautionary framework
    — developed for animal welfare policy and codified in "The Edge of Sentience" — is being explicitly extended to AI. The
    framework argues that where there is reasonable scientific evidence that an entity might be sentient, the burden of proof
    should shift toward treating it as a moral patient. Birch co-authored Butlin et al. (2023), the field's anchor paper,
    making the Coller Centre the primary bridge between animal sentience research and AI consciousness assessment.
