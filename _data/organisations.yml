- name: Institute for Advanced Consciousness Studies (IACS)
  url: https://advancedconsciousness.org/
  zone: empirical-foundations
  description: 'Independent nonprofit research lab based in Santa Monica, California. Uses neuroimaging, neuromodulation,
    and systematic study of altered states — including psychedelics and meditation — to identify neural correlates of discrete
    consciousness states. More experimentally than theoretically focused, IACS occupies a distinctive niche: generating empirical
    data on the boundaries of conscious experience that consciousness theories applied to AI must ultimately account for.'
  org_type: nonprofit
  function: research
  geography: USA
  logo: institute-for-advanced-consciousness-studies-iacs
  founding_year: '2019'
  key_figures:
  - name: Nicco Reggente (PI)
    url: https://advancedconsciousness.org/nicco-reggente/
- name: MIND Group / Open MIND Network
  url: https://open-mind.net/
  zone: empirical-foundations
  description: International research network founded by Thomas Metzinger in 2003; brings together early-career philosophers
    and scientists working on consciousness and cognition. Produced the landmark Open MIND collection — 39 open-access target
    articles with commentaries. Metzinger's "no-self" theory and his concept of the phenomenal self-model have been applied
    to AI consciousness debates — particularly the question of whether AI systems could have self-models without genuine phenomenal
    experience.
  org_type: community
  function: research
  geography: international
  logo: mind-group-open-mind-network
  founding_year: '2003'
