- name: Co-Sentience Initiative (CoSI)
  url: https://cf-debate.com/about/
  zone: digital-minds
  description: 'Independent initiative maintaining CF Debate — a structured database of 43+ philosophical arguments for and
    against computational functionalism, the thesis that consciousness depends only on computation and not on physical substrate.
    This question is foundational for the digital minds field: if computational functionalism is true, AI systems running
    the right computations could in principle be conscious; if false, substrate matters and silicon-based consciousness may
    be impossible regardless of computational structure. Founded 2025.'
  org_type: nonprofit
  function: research
  geography: international
  logo: co-sentience-initiative-cosi
  founding_year: '2025'
  key_figures:
  - name: Chris Percy (Founder)
    url: https://sentience-research.org/
- name: Conscium
  url: https://conscium.com/
  zone: digital-minds
  description: UK-based AI safety company founded by Daniel Hulme (who sold AI consultancy Satalia to WPP). Investigates machine
    consciousness through neuromorphic computing, arguing that a conscious superintelligence may be safer than an unconscious
    one because it could appreciate and empathise with human experience. Partners with UC Santa Cruz on spiking neural networks.
    Developing VerifyAX (AI agent verification), ArenaAX (third-party testing), and NeuroAX (neuromorphic computing platform).
    Seed-funded PRISM. As a private company, Conscium points to a wider population of private actors the map cannot fully
    capture.
  org_type: lab-team
  function: research
  geography: UK
  logo: conscium
  key_figures:
