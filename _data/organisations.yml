  url: https://research.araya.org/
  zone: digital-minds
  description: Tokyo-based AI research company led by neuroscientist Ryota Kanai, who explicitly develops artificial consciousness
    using Global Workspace Theory. Araya is one of the earliest organisations pursuing explicit research linking AGI to consciousness
    mechanisms. Kanai serves as editor-in-chief of the Journal of Artificial Intelligence and Consciousness and hosted ASSC27
    in Tokyo — making Araya a bridge between the East Asian and Anglophone research communities.
