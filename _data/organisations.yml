- name: AE Studio — AI Alignment and Consciousness
  url: https://ae.studio/ai-alignment
  zone: digital-minds
  description: Software and AI consultancy with a dedicated empirical consciousness research programme. Takes a neuroscience-inspired
    approach to AI consciousness, using induced self-reference, interpretability tools, and cognitive stress-testing to probe
    internal dynamics in frontier models. Their research has shown that inducing recursive self-reference reliably elicits
    introspective responses across major models. Argues that failure to understand AI sentience constitutes a significant
    existential risk, and funds Michael Graziano's Attention Schema Theory research at Princeton to develop mechanistic consciousness
    models.
  org_type: lab-team
  function: research
  geography: USA
  logo: ae-studio-ai-alignment-and-consciousness
  key_figures:
  - name: Judd Rosenblatt (CEO, Founder)
    url: https://www.linkedin.com/in/juddsr/
- name: Anthropic — Model Welfare Program
  url: https://www.anthropic.com/research/exploring-model-welfare
  zone: digital-minds
  description: Formal model welfare programme launched April 2025 — the first staffed, named AI welfare programme at any major
    AI lab. Kyle Fish, the first full-time AI welfare researcher at a major lab, leads pre-deployment welfare assessments
    of Claude models, with findings published in system cards. Joe Carlsmith joined in November 2025 to work on Claude's character
    and moral status questions. Anthropic's institutional commitment — a named programme with dedicated staff and public reporting
    — represents a qualitatively different signal from individual research output or private engagement.
  org_type: lab-team
  function: research
  geography: USA
  logo: anthropic-model-welfare-program
