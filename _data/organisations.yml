- name: Berggruen Institute
  url: https://berggruen.org/
  zone: philosophical-foundations
  description: 'Well-resourced global think tank operating as a foundation that funds its own curated programmes rather than
    making external grants. Engages digital minds questions through multiple channels: the "After Consciousness" project (with
    HKU''s AI & Humanity Lab) examining whether the concept of consciousness distorts AI discourse; the Future Humans programme
    bringing neuroscience, AI, philosophy, and contemplative traditions into dialogue around consciousness; the annual Berggruen
    Prize essay competition (2025 winner: Anil Seth); open-application fellowships at USC and Peking University; and Noema
    magazine (listed separately). Contributors include Keith Frankish, Edouard Machery, and Wayne Wu.'
