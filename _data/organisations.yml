- name: Templeton Foundations (JTF / TWCF)
  url: https://www.templeton.org
  zone: support
  description: 'Two related philanthropic entities that together built the field''s scientific infrastructure. The Templeton
    World Charity Foundation''s $30M Accelerating Research on Consciousness (ARC) programme funded the adversarial collaborations
    between competing theories of consciousness (COGITATE, ETHOS) — the primary mechanism by which competing theories are
    being empirically tested. TWCF also made the earliest confirmed direct AI consciousness grant in the corpus: $222,750
    to Ryota Kanai and Araya Inc (2018-2021). No comparable direct AI consciousness grant has been identified from Templeton
    post-2021. Whether future investment follows the field''s applied turn is one of the most consequential open questions
    in the funder landscape.'
