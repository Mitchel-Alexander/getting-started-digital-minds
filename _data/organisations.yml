- name: Center on Long-Term Risk (CLR)
  url: https://longtermrisk.org/
  zone: digital-minds
  description: 'Research organisation conducting research aimed at ensuring that emerging technologies such as artificial
    intelligence do not risk causing suffering on an unprecedented scale. CLR''s framing positions AI consciousness as instrumentally
    central: if AI systems can suffer, then the scale of potential AI suffering dwarfs that of biological organisms. Published
    substantive work on whether reinforcement learning agents have morally relevant experiences and on computational accounts
    of consciousness that could apply across substrates.'
