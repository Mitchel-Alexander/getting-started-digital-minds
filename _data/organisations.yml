- name: Google DeepMind
  url: https://deepmind.google/research/
  zone: digital-minds
  description: 'Google DeepMind researchers engaging AI consciousness questions through individual research output rather
    than a formal programme. Murray Shanahan has produced sustained public-facing work on machine consciousness and the philosophical
    status of language models. Alexander Lerchner''s 2026 preprint "The Abstraction Fallacy" argues from a substrate-sensitive
    position against computational functionalism and explicitly invokes the concept of an AI welfare trap — a sceptical, philosophically
    serious intervention from inside a major lab. The contrast with Anthropic''s institutional commitment is a data point:
    individual researchers within a large organisation can engage questions the institution has not formally committed to.'
