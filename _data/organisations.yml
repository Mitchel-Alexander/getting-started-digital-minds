  url: https://centerforsleepandconsciousness.psychiatry.wisc.edu/
  zone: empirical-foundations
  description: Giulio Tononi's lab at UW–Madison; the primary home of Integrated Information Theory (IIT), which proposes
    a mathematical measure of consciousness (Φ) based on information integration. IIT's framework has been directly applied
    to AI consciousness assessment — it is one of six theories used in Butlin et al. (2023) to derive indicators for evaluating
    AI systems, and a core input to Rethink Priorities' Digital Consciousness Model.
