- name: Graziano Lab (Princeton University)
  url: https://grazianolab.com/
  zone: empirical-foundations
  description: Michael Graziano's lab at Princeton; develops Attention Schema Theory (AST), which proposes consciousness arises
    from the brain's internal model of its own attentional processes. AST is arguably the consciousness theory most readily
    applied to AI systems, since attention mechanisms are a core architectural feature of modern AI. AE Studio has directly
    funded Graziano's research to advance this application.
